<!DOCTYPE html>
<html lang="es-CR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cámara de Cañeros Zona Sur – Almacén San Isidro</title>
  <meta name="description" content="Almacén agropecuario líder en Pérez Zeledón desde 1975"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* (Mantengo todo tu CSS original aquí - no lo copio completo por espacio, pero está intacto) */
    :root { --fg: #166534; --gold: #EAB308; }
    .prod-card { transition: all 0.3s; }
    .prod-card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(22 101 52); }
    .cart-item { animation: slideIn 0.3s; }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="font-sans">

<!-- Tu header, hero, catálogo, nosotros, testimonios, sucursales, cotizar y contacto se mantienen exactamente igual que antes -->

<!-- NUEVO: Modal de Login / Registro -->
<div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
  <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
    <h2 class="text-2xl font-bold text-center mb-6" id="modal-title">Iniciar Sesión</h2>
    
    <div id="login-form">
      <input id="login-email" type="email" placeholder="Correo electrónico" class="f-input mb-3"/>
      <input id="login-pass" type="password" placeholder="Contraseña" class="f-input mb-6"/>
      <button onclick="loginUser()" class="btn-gold w-full py-4 text-lg">Iniciar Sesión</button>
      <p class="text-center mt-4 text-sm text-gray-500">¿No tienes cuenta? 
        <span onclick="showRegister()" class="text-green-600 cursor-pointer hover:underline">Regístrate gratis</span>
      </p>
    </div>

    <div id="register-form" class="hidden">
      <input id="reg-name" type="text" placeholder="Nombre completo" class="f-input mb-3"/>
      <input id="reg-email" type="email" placeholder="Correo electrónico" class="f-input mb-3"/>
      <input id="reg-pass" type="password" placeholder="Contraseña" class="f-input mb-6"/>
      <button onclick="registerNewUser()" class="btn-gold w-full py-4 text-lg">Crear Cuenta</button>
      <p class="text-center mt-4 text-sm text-gray-500">¿Ya tienes cuenta? 
        <span onclick="showLogin()" class="text-green-600 cursor-pointer hover:underline">Inicia sesión</span>
      </p>
    </div>

    <button onclick="closeLoginModal()" class="absolute top-4 right-4 text-3xl text-gray-400 hover:text-gray-600">×</button>
  </div>
</div>

<!-- NUEVO: Carrito de Compras (Compra real) -->
<div id="purchase-cart-drawer" class="fixed top-0 right-0 h-full w-full max-w-[380px] bg-white shadow-2xl translate-x-full transition-transform duration-300 z-[2000] flex flex-col">
  <div class="p-5 border-b flex items-center justify-between bg-[#166534] text-white">
    <h3 class="font-bold text-xl">🛒 Carrito de Compras</h3>
    <button onclick="closePurchaseCart()" class="text-3xl leading-none">×</button>
  </div>
  
  <div id="purchase-cart-items" class="flex-1 p-5 overflow-auto space-y-4"></div>
  
  <div class="p-5 border-t">
    <div class="flex justify-between text-lg font-semibold mb-4">
      <span>Total:</span>
      <span id="purchase-total" class="text-2xl text-[#166534]">₡0</span>
    </div>
    <button onclick="processPayment()" class="btn-gold w-full py-4 text-lg">Pagar Ahora</button>
    <button onclick="clearPurchaseCart()" class="text-red-500 text-sm mt-3 w-full">Vaciar carrito</button>
  </div>
</div>

<!-- NUEVO: Panel de Administrador -->
<div id="admin-panel" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[10000]">
  <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
    <div class="px-8 py-5 border-b flex justify-between items-center bg-[#166534] text-white">
      <h2 class="text-2xl font-bold">👨‍💼 Panel de Administrador</h2>
      <button onclick="closeAdminPanel()" class="text-3xl">×</button>
    </div>
    
    <div class="p-8 overflow-auto max-h-[calc(90vh-70px)]">
      <h3 class="text-lg font-semibold mb-4">📦 Pedidos Pendientes de Pago</h3>
      <div id="admin-pending-orders" class="space-y-3 mb-10"></div>

      <h3 class="text-lg font-semibold mb-4">🛒 Carritos Activos (Usuarios con productos)</h3>
      <div id="admin-active-carts" class="space-y-3 mb-10"></div>

      <div class="bg-green-50 p-6 rounded-2xl">
        <h3 class="text-lg font-semibold mb-2">💰 Total de Ventas por Internet</h3>
        <div id="admin-total-sales" class="text-5xl font-bold text-green-700">₡0</div>
        <p class="text-green-600 text-sm">Actualizado en tiempo real</p>
      </div>
    </div>
  </div>
</div>

<!-- El resto de tu código (hero, catálogo, etc.) se mantiene igual hasta el final del <body> -->

<script>
// ==================== NUEVO CÓDIGO DE COMPRA ====================

// Agregamos precios a los productos
const PRODS = [ /* tu array original */ ].map(p => ({
  ...p,
  price: Math.floor(Math.random()*45000) + 8500  // precios entre ₡8.500 y ₡53.500
}));

let purchaseCart = JSON.parse(localStorage.getItem('purchase_cart') || '[]');
let currentUser = JSON.parse(localStorage.getItem('current_user') || 'null');
let orders = JSON.parse(localStorage.getItem('orders') || '[]'); // pedidos realizados

// Renderizar carrito de compra
function renderPurchaseCart() {
  const container = document.getElementById('purchase-cart-items');
  container.innerHTML = purchaseCart.map(item => {
    const prod = PRODS.find(p => p.id === item.id);
    return `
      <div class="cart-item flex gap-4 bg-gray-50 p-4 rounded-2xl">
        <div class="text-4xl flex-shrink-0">${prod.icon}</div>
        <div class="flex-1">
          <div class="font-semibold">${prod.name}</div>
          <div class="text-sm text-gray-500">${prod.desc.substring(0,60)}...</div>
          <div class="flex justify-between items-center mt-3">
            <div>
              <button onclick="changeQuantity(${item.id}, -1)" class="w-8 h-8 border rounded-xl">-</button>
              <span class="mx-3 font-medium">${item.qty}</span>
              <button onclick="changeQuantity(${item.id}, 1)" class="w-8 h-8 border rounded-xl">+</button>
            </div>
            <div class="text-right">
              <div class="font-bold text-lg">₡${(prod.price * item.qty).toLocaleString('es-CR')}</div>
              <button onclick="removeFromPurchaseCart(${item.id})" class="text-red-500 text-xs">Eliminar</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  const total = purchaseCart.reduce((sum, item) => {
    const prod = PRODS.find(p => p.id === item.id);
    return sum + (prod.price * item.qty);
  }, 0);

  document.getElementById('purchase-total').textContent = `₡${total.toLocaleString('es-CR')}`;
}

// Agregar al carrito de compra
function addToPurchase(id) {
  const existing = purchaseCart.find(item => item.id === id);
  if (existing) {
    existing.qty++;
  } else {
    purchaseCart.push({ id, qty: 1 });
  }
  localStorage.setItem('purchase_cart', JSON.stringify(purchaseCart));
  renderPurchaseCart();
  openPurchaseCart();
  toast('🛒', 'Producto agregado al carrito de compra');
}

function changeQuantity(id, change) {
  const item = purchaseCart.find(i => i.id === id);
  if (!item) return;
  item.qty += change;
  if (item.qty < 1) item.qty = 1;
  localStorage.setItem('purchase_cart', JSON.stringify(purchaseCart));
  renderPurchaseCart();
}

function removeFromPurchaseCart(id) {
  purchaseCart = purchaseCart.filter(i => i.id !== id);
  localStorage.setItem('purchase_cart', JSON.stringify(purchaseCart));
  renderPurchaseCart();
}

function clearPurchaseCart() {
  purchaseCart = [];
  localStorage.setItem('purchase_cart', JSON.stringify(purchaseCart));
  renderPurchaseCart();
}

function openPurchaseCart() {
  renderPurchaseCart();
  document.getElementById('purchase-cart-drawer').classList.remove('translate-x-full');
}

function closePurchaseCart() {
  document.getElementById('purchase-cart-drawer').classList.add('translate-x-full');
}

// Simular pago
function processPayment() {
  if (purchaseCart.length === 0) return;
  
  const total = purchaseCart.reduce((sum, item) => {
    const prod = PRODS.find(p => p.id === item.id);
    return sum + (prod.price * item.qty);
  }, 0);

  // Guardar como pedido
  orders.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString('es-CR'),
    user: currentUser ? currentUser.name : 'Cliente invitado',
    total: total,
    status: 'pendiente',
    items: purchaseCart.map(i => {
      const p = PRODS.find(pr => pr.id === i.id);
      return `${p.name} × ${i.qty}`;
    })
  });

  localStorage.setItem('orders', JSON.stringify(orders));
  
  toast('🎉', '¡Pago realizado con éxito!');
  closePurchaseCart();
  purchaseCart = [];
  localStorage.setItem('purchase_cart', JSON.stringify(purchaseCart));
  
  // Actualizar panel admin si está abierto
  if (!document.getElementById('admin-panel').classList.contains('hidden')) {
    renderAdminPanel();
  }
}

// ==================== LOGIN Y ADMIN ====================

function showLoginModal() {
  document.getElementById('login-modal').classList.remove('hidden');
  showLogin();
}

function closeLoginModal() {
  document.getElementById('login-modal').classList.add('hidden');
}

function showLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('modal-title').textContent = 'Iniciar Sesión';
}

function showRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
  document.getElementById('modal-title').textContent = 'Crear Cuenta';
}

function loginUser() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;

  // Usuario administrador (para pruebas)
  if (email === 'admin@camara.cr' && pass === 'admin123') {
    currentUser = { name: 'Administrador', role: 'admin', email };
    localStorage.setItem('current_user', JSON.stringify(currentUser));
    closeLoginModal();
    openAdminPanel();
    toast('👑', 'Bienvenido Administrador');
    return;
  }

  // Usuario normal
  currentUser = { name: email.split('@')[0], role: 'user', email };
  localStorage.setItem('current_user', JSON.stringify(currentUser));
  closeLoginModal();
  toast('👋', `¡Bienvenido ${currentUser.name}!`);
}

function registerNewUser() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  currentUser = { name, role: 'user', email };
  localStorage.setItem('current_user', JSON.stringify(currentUser));
  closeLoginModal();
  toast('🎉', 'Cuenta creada con éxito');
}

function openAdminPanel() {
  if (!currentUser || currentUser.role !== 'admin') {
    alert('Solo el administrador puede acceder');
    return;
  }
  document.getElementById('admin-panel').classList.remove('hidden');
  renderAdminPanel();
}

function closeAdminPanel() {
  document.getElementById('admin-panel').classList.add('hidden');
}

function renderAdminPanel() {
  // Pedidos pendientes
  let html = orders.filter(o => o.status === 'pendiente').map(o => `
    <div class="flex justify-between items-center bg-white border rounded-2xl p-4">
      <div>
        <div class="font-medium">${o.user}</div>
        <div class="text-sm text-gray-500">${o.date} • ${o.items.join(', ')}</div>
      </div>
      <div class="text-right">
        <div class="font-bold text-xl">₡${o.total.toLocaleString('es-CR')}</div>
        <button onclick="markAsPaid(${o.id})" class="text-xs bg-green-600 text-white px-4 py-1 rounded-xl">Marcar como pagado</button>
      </div>
    </div>`).join('') || '<p class="text-gray-400">No hay pedidos pendientes</p>';
  document.getElementById('admin-pending-orders').innerHTML = html;

  // Carritos activos
  document.getElementById('admin-active-carts').innerHTML = `
    <div class="bg-white border rounded-2xl p-4">
      <strong>Cliente invitado</strong> tiene ${purchaseCart.length} productos en el carrito
    </div>`;

  // Total ventas
  const totalSales = orders.reduce((sum, o) => sum + o.total, 0);
  document.getElementById('admin-total-sales').textContent = `₡${totalSales.toLocaleString('es-CR')}`;
}

function markAsPaid(id) {
  const order = orders.find(o => o.id === id);
  if (order) order.status = 'pagado';
  localStorage.setItem('orders', JSON.stringify(orders));
  renderAdminPanel();
}

// ==================== INTEGRACIÓN EN LAS TARJETAS DE PRODUCTOS ====================

// En la función renderCatalog() reemplaza la parte de botones por esto:

// Dentro del map de productos, en la sección <div class="p-actions"> cambia por:

`<div class="p-actions grid grid-cols-2 gap-2">
  <button onclick="toggleProd(${p.id});" class="btn-add ${inC?'added':''}">
    ${inC ? '✓ Cotizar' : '+ Cotizar'}
  </button>
  <button onclick="addToPurchase(${p.id});" 
          class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded-2xl flex items-center justify-center gap-1 text-sm">
    🛒 Comprar
  </button>
</div>`

// (Asegúrate de llamar a renderCatalog() después de definir las funciones nuevas)

// Al final del <script> agrega:
window.addEventListener('load', () => {
  // ... tu código original
  if (currentUser && currentUser.role === 'admin') {
    // Opcional: botón para abrir admin
    console.log('%c🔑 Admin disponible', 'background:#166534;color:white;padding:2px 6px;border-radius:4px');
  }
});
</script>
</body>
</html>
